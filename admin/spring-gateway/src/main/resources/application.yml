server:
  port: 9000

spring:
  profiles:
    active: log,nacos-config,nacos-discovery
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: admin-user
          uri: lb://admin-user
          predicates:
            - Path=/user/**
        - id: admin-auth
          uri: lb://admin-auth
          predicates:
            - Path=/auth/**

    # Sentinel configuration
    sentinel:
      transport:
        dashboard: localhost:8080
        port: 8719
      datasource:
        ds1:
          nacos:
            server-addr: localhost:8848
            username: nacos
            password: nacos
            data-id: spring-gateway-sentinel-rules
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: gw-flow

management:
  endpoints:
    web:
      exposure:
        include: '*'

management:
  endpoints:
    web:
      exposure:
        include: '*'
