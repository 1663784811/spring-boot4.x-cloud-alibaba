server:
  port: 9000

spring:
  profiles:
    active: log,nacos-config,nacos-discovery,redis
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: admin-user
          uri: lb://admin-user
          predicates:
            - Path=/user/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
        - id: admin-auth
          uri: lb://admin-auth
          predicates:
            - Path=/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

management:
  endpoints:
    web:
      exposure:
        include: '*'
