# Sentinel Configuration
spring:
  cloud:
    sentinel:
      enabled: true
      transport:
        dashboard: localhost:8080
        port: 8719
      datasource:
        ds1:
          nacos:
            server-addr: localhost:8848
            username: nacos
            password: nacos
            data-id: spring-gateway-sentinel-rules
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: gw-flow